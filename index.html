<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aurum – Professional Crypto Investment Platform" />
    <meta name="theme-color" content="#080a0f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <title>Aurum · Crypto Platform</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #080a0f; color: #e8ecf4; font-family: 'Syne', sans-serif; }
      #root { min-height: 100vh; }
      #splash {
        position: fixed; inset: 0; background: #080a0f;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px; z-index: 9999;
        transition: opacity .4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-logo {
        width: 60px; height: 60px; border-radius: 16px;
        background: linear-gradient(135deg, #f0a500, #ffc333);
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 800; color: #000;
        box-shadow: 0 8px 32px rgba(240,165,0,0.4);
        animation: logoIn .5s ease both;
      }
      .splash-name { font-size: 22px; font-weight: 800; letter-spacing: 3px; color: #e8ecf4; }
      .splash-sub  { font-size: 11px; letter-spacing: 3px; color: #5a6480; }
      .splash-bar  {
        width: 160px; height: 2px; background: #1c2230; border-radius: 4px; overflow: hidden; margin-top: 8px;
      }
      .splash-fill {
        height: 100%; width: 0; background: linear-gradient(90deg,#f0a500,#ffc333);
        border-radius: 4px; animation: fill 1.2s ease forwards;
      }
      @keyframes logoIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
      @keyframes fill   { from{width:0} to{width:100%} }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <div class="splash-logo">◈</div>
      <div class="splash-name">AURUM</div>
      <div class="splash-sub">CRYPTO PLATFORM</div>
      <div class="splash-bar"><div class="splash-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash when React mounts
      window.__hideSplash = () => {
        const s = document.getElementById("splash");
        if (s) { s.classList.add("hidden"); setTimeout(()=>s.remove(),500); }
      };
    </script>
  </body>
</html>
